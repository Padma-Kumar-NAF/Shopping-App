<div class="admin-shell">

  <!-- ── Sidebar ─────────────────────────────────────────────────────────── -->
  <aside class="admin-sidebar" [class.open]="mobileMenuOpen()">
    <!-- Brand -->
    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div>
        <p class="brand-name">ShopAdmin</p>
        <p class="brand-sub">Management Console</p>
      </div>
    </div>

    <!-- Nav -->
    <nav class="sidebar-nav">
      <p class="nav-section-label">Main Menu</p>
      @for (item of navItems; track item.path) {
      <a [routerLink]="item.path" (click)="closeMobileMenu()"
        class="nav-item" [class.active]="isActive(item.path)">
        <span class="nav-icon">{{ item.icon }}</span>
        <span class="nav-label">{{ item.label }}</span>
        @if (isActive(item.path)) {
        <span class="nav-active-dot"></span>
        }
      </a>
      }
    </nav>

    <!-- Logout at bottom -->
    <div class="sidebar-footer">
      <button (click)="logout()" class="sidebar-logout">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Logout
      </button>
    </div>
  </aside>

  <!-- Overlay for mobile -->
  @if (mobileMenuOpen()) {
  <div class="sidebar-overlay" (click)="closeMobileMenu()"></div>
  }

  <!-- ── Main area ───────────────────────────────────────────────────────── -->
  <div class="admin-main">

    <!-- Topbar -->
    <header class="admin-topbar">
      <button class="topbar-hamburger" (click)="toggleMobileMenu()">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>

      <div class="topbar-breadcrumb">
        <span class="breadcrumb-root">Admin</span>
        <svg class="w-3 h-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
        </svg>
        <span class="breadcrumb-current">{{ currentPageLabel() }}</span>
      </div>

      <div class="topbar-right">
        <div class="topbar-avatar">
          <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
          </svg>
        </div>
        <span class="topbar-role">Admin</span>
      </div>
    </header>

    <!-- Page content -->
    <main class="admin-content">
      <div class="animate-fade-in">
        <router-outlet></router-outlet>
      </div>
    </main>

  </div>
</div>
