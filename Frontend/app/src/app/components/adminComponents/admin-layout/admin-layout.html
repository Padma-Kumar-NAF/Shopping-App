<div class="min-h-screen bg-gray-100">
  <!-- Top Navigation Bar -->
  <nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center gap-3">
          <button
            (click)="toggleMobileMenu()"
            class="lg:hidden flex items-center justify-center w-10 h-10 rounded-lg hover:bg-gray-100 transition-colors"
          >
            <svg
              class="w-6 h-6 text-gray-700"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              @if (mobileMenuOpen()) {
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              />
              } @else {
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 6h16M4 12h16M4 18h16"
              />
              }
            </svg>
          </button>

          <div
            class="w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-lg flex items-center justify-center"
          >
            <span class="text-white text-xl font-bold">A</span>
          </div>
          <div>
            <h1 class="text-xl font-bold text-gray-900">Admin Panel</h1>
            <p class="text-xs text-gray-500 hidden sm:block">ShopApp Management</p>
          </div>
        </div>

        <button
          (click)="logout()"
          class="flex items-center gap-2 px-4 py-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-100 transition-colors duration-200 font-medium"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
            />
          </svg>
          <span class="hidden sm:inline">Logout</span>
        </button>
      </div>
    </div>

    <!-- Mobile Menu -->
    @if (mobileMenuOpen()) {
    <div class="lg:hidden border-t border-gray-200 bg-white">
      <div class="px-4 py-2 space-y-1">
        @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          (click)="closeMobileMenu()"
          [class.bg-blue-50]="isActive(item.path)"
          [class.text-blue-600]="isActive(item.path)"
          [class.text-gray-700]="!isActive(item.path)"
          class="w-full flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-50 transition-colors"
        >
          <span class="text-xl">{{ item.icon }}</span>
          <span class="font-medium">{{ item.label }}</span>
        </a>
        }
      </div>
    </div>
    }
  </nav>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Desktop Navigation Tabs -->
    <div class="bg-white rounded-xl shadow-md mb-6 overflow-hidden hidden lg:block">
      <nav class="flex overflow-x-auto scrollbar-hide">
        @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          [class]="
            isActive(item.path)
              ? 'bg-blue-50 text-blue-600 border-b-3 border-blue-600'
              : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'
          "
          class="flex-1 min-w-[140px] py-4 px-4 text-center font-medium transition-all duration-200"
        >
          <div class="flex flex-col sm:flex-row items-center justify-center gap-2">
            <span class="text-2xl">{{ item.icon }}</span>
            <span class="text-sm sm:text-base">{{ item.label }}</span>
          </div>
        </a>
        }
      </nav>
    </div>

    <!-- Router Outlet for Child Routes -->
    <div class="animate-fade-in">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
