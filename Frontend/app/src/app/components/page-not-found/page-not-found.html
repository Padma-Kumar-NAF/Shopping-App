<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">
  <div class="text-center max-w-md">

    <h1 class="text-7xl font-extrabold text-red-500">404</h1>

    <h2 class="mt-4 text-2xl font-semibold text-gray-800">
      Page Not Found
    </h2>

    <p class="mt-2 text-gray-500">
      Sorry, the page you're looking for doesn’t exist or has been moved.
    </p>

    <button
      (click)="goHome()"
      class="mt-6 px-6 py-3 bg-blue-600 text-white rounded-xl shadow-md hover:bg-blue-700 transition duration-300"
    >
      Go to Home
    </button>

  </div>
</div>
