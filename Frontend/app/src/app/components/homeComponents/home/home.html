<nav class="fixed top-0 left-0 right-0 bg-white shadow-md z-50">
  <div class="w-full mx-auto px-4 py-3 flex items-center">
    <h1 class="text-xl font-bold text-blue-600">ShopApp</h1>

    <div class="flex-1 px-6">
      <input
        type="text"
        placeholder="Search products..."
        class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <div class="flex items-center gap-5 text-gray-700">
      <button class="p-1.5 rounded button-shadow">🛒 Cart</button>

      <button class="cursor-pointer p-1.5 rounded button-shadow">👤 Profile</button>
    </div>
  </div>
</nav>

<div class="pt-20 w-full mx-auto px-4">
  <h2 class="text-2xl font-semibold mt-10 mb-6">Categories</h2>
  <div class="my-6">
    <div class="hidden md:flex gap-3 overflow-x-auto pb-2 flex justify-around">
      @for (c of categories; track c) {
        <button
          class="px-4 py-2 bg-blue-100 button-shadow rounded whitespace-nowrap hover:bg-gray-100 transition"
        >
          {{ c }}
        </button>
      }
    </div>

    <div class="md:hidden">
      <select class="w-full border rounded-lg p-2">
        @for (c of categories; track c) {
          <option>{{ c }}</option>
        }
      </select>
    </div>
  </div>

  <app-product-carousel></app-product-carousel>

  <h2 class="text-2xl font-semibold mt-10 mb-6">Products</h2>

  @if (products.length) {
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
      @for (product of products; track product.name) {
        <button class="border rounded-lg overflow-hidden shadow hover:shadow-lg transition">
          <img [src]="product.image" class="w-full h-48 object-cover" />

          <div class="p-4">
            <h3 class="font-semibold text-lg">
              {{ product.name }}
            </h3>

            <p class="text-blue-600 font-bold mt-1">₹{{ product.price }}</p>

            <div class="flex gap-1">
              <button
                class="mt-3 w-full bg-blue-400 text-black py-2 rounded transition"
              >
                Add to Cart
              </button>
              <button
                class="mt-3 w-full bg-green-400 text-black py-2 rounded transition"
              >
                Buy
              </button>
            </div>
          </div>
        </button>
      }
    </div>
  } @else {
    <p class="text-gray-500">No products available</p>
  }
</div>

<app-footer></app-footer>
