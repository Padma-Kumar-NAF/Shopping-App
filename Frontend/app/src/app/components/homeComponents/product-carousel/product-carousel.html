<div class="relative w-full h-64 md:h-96 overflow-hidden rounded-lg shadow-lg">
  <div
    class="flex transition-transform duration-700 ease-in-out h-full"
    [style.transform]="'translateX(-' + currentIndex * 100 + '%)'"
  >
    @for (img of images; track img) {
    <div class="min-w-full h-full flex-shrink-0">
      <img [src]="img" alt="Banner" class="w-full h-full object-cover" />
    </div>
    }
  </div>

  <button
    (click)="prevSlide()"
    class="absolute left-4 top-1/2 transform -translate-y-1/2 bg-white/80 hover:bg-white text-gray-800 rounded-full p-2 shadow-lg transition-all duration-200"
  >
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
    </svg>
  </button>

  <button
    (click)="nextSlide()"
    class="absolute right-4 top-1/2 transform -translate-y-1/2 bg-white/80 hover:bg-white text-gray-800 rounded-full p-2 shadow-lg transition-all duration-200"
  >
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
    </svg>
  </button>

  <div class="absolute bottom-4 left-1/2 transform -translate-x-1/2 flex gap-2">
    @for (img of images; track img; let i = $index) {
    <button
      (click)="goToSlide(i)"
      [class]="currentIndex === i ? 'bg-white w-8' : 'bg-white/50 w-2'"
      class="h-2 rounded-full transition-all duration-300"
    ></button>
    }
  </div>
</div>
