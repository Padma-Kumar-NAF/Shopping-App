<div class="promo-modal__backdrop" (click)="onBackdropClick($event)" role="dialog" aria-modal="true" aria-label="Promo Codes">
  <div class="promo-modal__panel">

    <!-- Header -->
    <div class="promo-modal__header">
      <div class="promo-modal__header-left">
        <span class="promo-modal__header-icon">🎟️</span>
        <div>
          <h2 class="promo-modal__title">Promo Codes</h2>
          <p class="promo-modal__subtitle">{{ promoCodes.length }} offers available</p>
        </div>
      </div>
      <button class="promo-modal__close" (click)="close.emit()" aria-label="Close">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Grid -->
    <div class="promo-modal__body">
      <div class="promo-modal__grid">
        @for (promo of promoCodes; track promo.id) {
          <div class="promo-card" [style.--accent]="promo.color">
            <div class="promo-card__top">
              <span class="promo-card__title">{{ promo.title }}</span>
              <span class="promo-card__discount">{{ promo.discount }}</span>
            </div>
            <div class="promo-card__bottom">
              <span class="promo-card__code">{{ promo.code }}</span>
              <button
                class="promo-card__copy-btn"
                [class.promo-card__copy-btn--copied]="copiedCode() === promo.code"
                (click)="copyCode(promo.code)"
                [attr.aria-label]="'Copy ' + promo.code"
              >
                @if (copiedCode() === promo.code) {
                  <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="12" height="12">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
                  </svg>
                  Copied!
                } @else {
                  <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="12" height="12">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                  </svg>
                  Copy
                }
              </button>
            </div>
          </div>
        }
      </div>
    </div>

  </div>
</div>
